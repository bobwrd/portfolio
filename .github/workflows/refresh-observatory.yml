name: Refresh Observatory data

# Re-fetches the Observatory dataset (World Bank + FRED) into
# content/observatory/observatory.json, commits any change, and (if something
# changed) rebuilds and redeploys the Worker. Same self-deploy pattern as
# sync-drive.yml — a GITHUB_TOKEN commit does not trigger deploy.yml.
#
# FRED enrichment only happens if the FRED_API_KEY secret is set. Without it,
# the World Bank baseline still refreshes. Get a free key at
# https://fredaccount.stlouisfed.org/apikeys and add it under
# Settings -> Secrets and variables -> Actions -> New repository secret.

on:
  schedule:
    # Monthly data lands on a lag; weekly is plenty. 05:00 UTC every Monday.
    - cron: "0 5 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-observatory
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Observatory data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/fetch-observatory.mjs

      - name: Commit changes
        id: commit
        run: |
          git config user.name "observatory-bot"
          git config user.email "observatory@users.noreply.github.com"
          git add content/observatory/observatory.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes."
          else
            git commit -m "chore(observatory): refresh AI/productivity/prices data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - name: Deploy with Wrangler
        if: steps.commit.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
